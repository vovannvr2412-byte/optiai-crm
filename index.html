<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=http://localhost:3000" />
    <title>OptiAI CRM</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f6f4ef;
        color: #171717;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }

      main {
        max-width: 620px;
        padding: 28px;
        border: 1px solid #ded8cb;
        border-radius: 8px;
        background: #fffdf8;
        box-shadow: 0 18px 48px rgba(36, 35, 31, 0.1);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 32px;
      }

      code {
        display: inline-block;
        padding: 3px 6px;
        border-radius: 6px;
        background: #f2ede2;
      }

      a {
        color: #0d9488;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OptiAI CRM перенесена на Next.js</h1>
      <p>Новый продукт запускается как веб-приложение с API и базой данных.</p>
      <p>Если переадресация не сработала, открой: <a href="http://localhost:3000">http://localhost:3000</a></p>
      <p>Команда запуска: <code>npm run serve</code></p>
    </main>
  </body>
</html>
